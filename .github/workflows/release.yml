name: Release WhytChat v0.5.0

on:
  release:
    types: [published]
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2

      - name: Install jq
        run: choco install jq

      - name: Install frontend dependencies
        run: |
          cd Frontend
          npm ci

      - name: Install backend dependencies
        run: |
          cd Backend/src-tauri
          cargo fetch

      - name: Build frontend
        run: |
          cd Frontend
          npm run build

      - name: Enable bundling for release
        run: |
          cd Backend/src-tauri
          jq '.bundle.active = true' tauri.conf.json > temp.json && move temp.json tauri.conf.json

      - name: Build Tauri app for Windows
        run: |
          cd Backend/src-tauri
          cargo tauri build --target x86_64-pc-windows-msvc

      - name: Restore bundling setting
        run: |
          cd Backend/src-tauri
          jq '.bundle.active = false' tauri.conf.json > temp.json && move temp.json tauri.conf.json

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WhytChat_v050_Windows
          path: |
            Backend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            Backend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/exe/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf jq

      - name: Install frontend dependencies
        run: |
          cd Frontend
          npm ci

      - name: Install backend dependencies
        run: |
          cd Backend/src-tauri
          cargo fetch

      - name: Build frontend
        run: |
          cd Frontend
          npm run build

      - name: Enable bundling for release
        run: |
          cd Backend/src-tauri
          jq '.bundle.active = true' tauri.conf.json > temp.json && mv temp.json tauri.conf.json

      - name: Build Tauri app for Linux
        run: |
          cd Backend/src-tauri
          cargo tauri build --target x86_64-unknown-linux-gnu

      - name: Restore bundling setting
        run: |
          cd Backend/src-tauri
          jq '.bundle.active = false' tauri.conf.json > temp.json && mv temp.json tauri.conf.json

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WhytChat_v050_Linux
          path: |
            Backend/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            Backend/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2

      - name: Install jq
        run: brew install jq

      - name: Install frontend dependencies
        run: |
          cd Frontend
          npm ci

      - name: Install backend dependencies
        run: |
          cd Backend/src-tauri
          cargo fetch

      - name: Build frontend
        run: |
          cd Frontend
          npm run build

      - name: Enable bundling for release
        run: |
          cd Backend/src-tauri
          jq '.bundle.active = true' tauri.conf.json > temp.json && mv temp.json tauri.conf.json

      - name: Build Tauri app for macOS x86_64
        run: |
          cd Backend/src-tauri
          cargo tauri build --target x86_64-apple-darwin

      - name: Build Tauri app for macOS ARM64
        run: |
          cd Backend/src-tauri
          cargo tauri build --target aarch64-apple-darwin

      - name: Restore bundling setting
        run: |
          cd Backend/src-tauri
          jq '.bundle.active = false' tauri.conf.json > temp.json && mv temp.json tauri.conf.json

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WhytChat_v050_macOS
          path: |
            Backend/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            Backend/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg